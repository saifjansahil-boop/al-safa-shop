<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محل ستائر الصفاء</title>

<style>
body {margin:0;font-family:sans-serif;background:#f5f5f5;text-align:center;}

header {
background:linear-gradient(135deg,#d4af37,#b8860b);
color:white;padding:20px;
}

.logo {width:80px;margin-bottom:10px;}

.location {
background:#4285F4;color:white;
padding:15px;margin:15px;
border-radius:20px;text-decoration:none;display:block;
}

/* SLIDER */
.slider {
position:relative;
height:300px;
overflow:hidden;
margin:15px;
border-radius:15px;
}

.slide {
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:1s;
}

.slide.active {opacity:1;}

/* FORM */
.form-box {
background:white;margin:20px;padding:20px;
border-radius:15px;
}

.form-box input,.form-box textarea,.form-box select {
width:90%;padding:10px;margin:10px;
}

/* BUTTON */
.btn {
background:#25d366;color:white;
padding:12px;text-decoration:none;display:block;
font-weight:bold;
}

/* FLOAT */
.whatsapp-float {
position:fixed;bottom:20px;right:20px;
background:#25d366;color:white;
padding:15px;border-radius:50%;
font-size:22px;text-decoration:none;
}

footer {
background:#111;color:#d4af37;
padding:20px;margin-top:20px;
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo"><br>
<h2>محل ستائر الصفاء</h2>
</header>

<a class="location" href="https://maps.google.com/?q=25.3647,49.5867">
📍 موقعنا: الهفوف - بجانب رايز جاردن
</a>

<!-- SLIDER -->
<div class="slider">
<img src="IMG-20260426-WA0012.jpg" class="slide active">
<img src="IMG-20260426-WA0011.jpg" class="slide">
<img src="IMG-20260426-WA0020.jpg" class="slide">
<img src="IMG-20260426-WA0019.jpg" class="slide">
<img src="IMG-20260426-WA0018.jpg" class="slide">
<img src="IMG-20260426-WA0017.jpg" class="slide">
<img src="IMG-20260426-WA0016.jpg" class="slide">
<img src="IMG-20260426-WA0015.jpg" class="slide">
<img src="IMG-20260426-WA0010.jpg" class="slide">
<img src="IMG-20260426-WA0018(2).jpg" class="slide">
<img src="IMG-20260426-WA0015(2).jpg" class="slide">
<img src="IMG-20260426-WA0012(2).jpg" class="slide">
<img src="IMG-20260208-WA0006.jpg" class="slide">
</div>

<!-- ORDER FORM -->
<div class="form-box">
<h2>📋 طلب ستائر أونلاين</h2>

<input type="text" id="name" placeholder="اسمك">
<input type="text" id="phone" placeholder="رقمك">

<input type="text" id="width" placeholder="العرض (مثلاً 3 متر)">
<input type="text" id="height" placeholder="الطول (مثلاً 2.5 متر)">

<select id="type">
<option>نوع الستارة</option>
<option>مودرن</option>
<option>كلاسيك</option>
<option>شفافة</option>
<option>بلاك اوت</option>
</select>

<textarea id="details" placeholder="تفاصيل إضافية"></textarea>

<button onclick="sendOrder()" class="btn">
إرسال الطلب عبر واتساب
</button>
</div>

<!-- FLOAT -->
<a href="https://wa.me/966565717405" class="whatsapp-float">💬</a>

<footer>
📞 0565717405<br>
محل ستائر الصفاء
</footer>

<script>
// SLIDER
let slides = document.querySelectorAll(".slide");
let index = 0;

function showSlide() {
slides.forEach(s => s.classList.remove("active"));
slides[index].classList.add("active");
index++;
if (index >= slides.length) index = 0;
}
setInterval(showSlide, 3000);

// ORDER
function sendOrder() {
var name = document.getElementById("name").value;
var phone = document.getElementById("phone").value;
var width = document.getElementById("width").value;
var height = document.getElementById("height").value;
var type = document.getElementById("type").value;
var details = document.getElementById("details").value;

var msg = "طلب جديد:%0A"
+ "الاسم: " + name + "%0A"
+ "الرقم: " + phone + "%0A"
+ "العرض: " + width + "%0A"
+ "الطول: " + height + "%0A"
+ "النوع: " + type + "%0A"
+ "تفاصيل: " + details;

window.open("https://wa.me/966565717405?text=" + msg, "_blank");
}
</script>

</body>
</html>
