<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محل ستائر الصفاء</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            text-align: center;
            color: #333;
        }

        /* هډر او د نوي لوګو برخه */
        header {
            background: linear-gradient(135deg, #001f3f, #003366); /* تیاره نیلي شالید */
            padding: 40px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .main-logo {
            width: 100%;
            max-width: 450px; /* د نوي زرین نوم اندازه */
            height: auto;
            filter: drop-shadow(0px 6px 10px rgba(0,0,0,0.5));
        }

        /* د ادرس بټن */
        .location {
            background: #d4af37; /* زرین رنګ */
            color: #fff;
            padding: 18px;
            margin: 20px auto;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            width: 85%;
            max-width: 500px;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .location:hover {
            background: #b8860b;
            transform: scale(1.02);
        }

        /* د ګالري ترتیب */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .item {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }

        .item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .btn {
            background: #25d366;
            color: white;
            padding: 15px;
            text-decoration: none;
            display: block;
            font-weight: bold;
            font-size: 16px;
        }

        /* د فرم برخه */
        .form-box {
            background: white;
            margin: 30px 20px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .form-box h2 { color: #003366; margin-bottom: 20px; }

        .form-box input, .form-box textarea, .form-box select {
            width: 95%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }

        .submit-btn {
            background: #003366;
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }

        /* د واټساپ فلوټینګ بټن */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25d366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        footer {
            background: #111;
            color: #d4af37;
            padding: 30px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    <img src="logo.png" alt="محل ستائر الصفاء" class="main-logo">
</header>

<a class="location" href="https://maps.google.com/?q=Al+Hofuf+Rise+Garden">
    📍 موقعنا: الهفوف - بجانب رايز جاردن
</a>

<div class="gallery">
    <div class="item"><img src="IMG-20260426-WA0012.jpg"><a href="https://wa.me/966565717405" class="btn">طلب عبر واتساب</a></div>
    <div class="item"><img src="IMG-20260426-WA0011.jpg"><a href="https://wa.me/966565717405" class="btn">طلب عبر واتساب</a></div>
    <div class="item"><img src="IMG-20260426-WA0020.jpg"><a href="https://wa.me/966565717405" class="btn">طلب عبر واتساب</a></div>
    <div class="item"><img src="IMG-20260426-WA0019.jpg"><a href="https://wa.me/966565717405" class="btn">طلب عبر واتساب</a></div>
    <div class="item"><img src="IMG-20260426-WA0018.jpg"><a href="https://wa.me/966565717405" class="btn">طلب عبر واتساب</a></div>
    <div class="item"><img src="IMG-20260426-WA0017.jpg"><a href="https://wa.me/966565717405" class="btn">طلب عبر واتساب</a></div>
    <div class="item"><img src="IMG-20260426-WA0016.jpg"><a href="https://wa.me/966565717405" class="btn">طلب عبر واتساب</a></div>
    <div class="item"><img src="IMG-20260426-WA0015.jpg"><a href="https://wa.me/966565717405" class="btn">طلب عبر واتساب</a></div>
    <div class="item"><img src="IMG-20260426-WA0010.jpg"><a href="https://wa.me/966565717405" class="btn">طلب عبر واتساب</a></div>
</div>

<div class="form-box">
    <h2>📋 طلب ستائر أونلاين</h2>
    <input type="text" id="name" placeholder="اسمك الكريم">
    <input type="text" id="phone" placeholder="رقم الجوال">
    <input type="text" id="width" placeholder="العرض المطلوب">
    <input type="text" id="height" placeholder="الارتفاع المطلوب">
    <select id="type">
        <option value="">اختر نوع الستارة</option>
        <option value="مودرن">مودرن</option>
        <option value="كلاسيك">كلاسيك</option>
        <option value="بلاك اوت">بلاك اوت</option>
    </select>
    <textarea id="details" placeholder="تفاصيل إضافية..."></textarea>
    <button class="submit-btn" onclick="sendOrder()">إرسال الطلب عبر واتساب</button>
</div>

<a href="https://wa.me/966565717405" class="whatsapp-float">💬</a>

<footer>
    <p>📞 التواصل: 0565717405</p>
    <p>© 2026 محل ستائر الصفاء - جميع الحقوق محفوظة</p>
</footer>

<script>
function sendOrder() {
    var name = document.getElementById("name").value;
    var phone = document.getElementById("phone").value;
    var width = document.getElementById("width").value;
    var height = document.getElementById("height").value;
    var type = document.getElementById("type").value;
    var details = document.getElementById("details").value;

    if(name == "" || phone == "") {
        alert("لطفاً الاسم والرقم ولیکئ.");
        return;
    }

    var msg = "مرحباً، طلب جديد من الموقع:%0A"
    + "👤 الاسم: " + name + "%0A"
    + "📞 الرقم: " + phone + "%0A"
    + "📏 العرض: " + width + "%0A"
    + "📐 الطول: " + height + "%0A"
    + "💎 النوع: " + type + "%0A"
    + "📝 ملاحظات: " + details;

    window.open("https://wa.me/966565717405?text=" + msg, "_blank");
}
</script>

</body>
</html>
