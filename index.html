/* HEADER */

    background: linear-gradient(to right, #c9a300, #e6c200);

    padding: 20px;
}

    width: 80px;

.card {
    background: white;

}

.card img {

}

/* BUTTON */
.btn {

}

.form-box input, .form-box textarea {
