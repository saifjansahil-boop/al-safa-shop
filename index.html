<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محل ستائر الصفاء</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI', Tahoma;
    background:#f8f9fb;
    text-align:center;
}

/* HEADER */
header {
    background: linear-gradient(135deg,#000,#333);
    color:#fff;
    padding:25px;
}

.logo {
    width:90px;
    border-radius:50%;
    border:3px solid #d4af37;
}

/* LOCATION */
.location {
    display:block;
    margin:15px auto;
    padding:15px;
    max-width:400px;
    background:linear-gradient(135deg,#007bff,#00c6ff);
    color:white;
    text-decoration:none;
    border-radius:50px;
}

/* SLIDER */
.slider {
    position:relative;
    height:300px;
    margin:15px;
    border-radius:20px;
    overflow:hidden;
}

.slide {
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:1s;
}

.slide.active {opacity:1;}

.prev,.next {
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.5);
    color:white;
    border:none;
    padding:10px;
    border-radius:50%;
    cursor:pointer;
}

.prev {left:10px;}
.next {right:10px;}

/* FORM */
.form-box {
    background:white;
    margin:20px;
    padding:20px;
    border-radius:20px;
}

.form-box input,.form-box textarea,.form-box select {
    width:90%;
    padding:10px;
    margin:10px;
}

/* BUTTON */
.btn {
    background:#25d366;
    color:white;
    padding:12px;
    border:none;
    border-radius:10px;
}

/* FLOAT */
.whatsapp-float {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25d366;
    color:white;
    padding:15px;
    border-radius:50%;
}

/* FOOTER */
footer {
    background:#000;
    color:#d4af37;
    padding:20px;
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo"><br>
<h2>محل ستائر الصفاء</h2>
</header>

<!-- ✅ NEW LOCATION -->
<a class="location" href="https://maps.app.goo.gl/oMpLiWp3CkfiqoaH8" target="_blank">
📍 اضغط هنا لفتح موقع المحل على الخريطة
</a>

<!-- SLIDER -->
<div class="slider">

<button class="prev" onclick="prevSlide()">❮</button>

<img src="IMG-20260426-WA0012.jpg" class="slide active">
<img src="IMG-20260426-WA0011.jpg" class="slide">
<img src="IMG-20260426-WA0020.jpg" class="slide">
<img src="IMG-20260426-WA0019.jpg" class="slide">
<img src="IMG-20260426-WA0018.jpg" class="slide">
<img src="IMG-20260426-WA0017.jpg" class="slide">
<img src="IMG-20260426-WA0016.jpg" class="slide">
<img src="IMG-20260426-WA0015.jpg" class="slide">
<img src="IMG-20260426-WA0010.jpg" class="slide">
<img src="IMG-20260426-WA0018(2).jpg" class="slide">
<img src="IMG-20260426-WA0015(2).jpg" class="slide">
<img src="IMG-20260426-WA0012(2).jpg" class="slide">
<img src="IMG-20260208-WA0006.jpg" class="slide">

<button class="next" onclick="nextSlide()">❯</button>

</div>

<!-- ORDER FORM -->
<div class="form-box">
<h2>📋 طلب ستائر أونلاين</h2>

<input type="text" id="name" placeholder="اسمك">
<input type="text" id="phone" placeholder="رقمك">
<input type="text" id="width" placeholder="العرض (مثلاً 3 متر)">
<input type="text" id="height" placeholder="الطول (مثلاً 2.5 متر)">

<select id="type">
<option>نوع الستارة</option>
<option>مودرن</option>
<option>كلاسيك</option>
<option>شفافة</option>
<option>بلاك اوت</option>
</select>

<textarea id="details" placeholder="تفاصيل إضافية"></textarea>

<button onclick="sendOrder()" class="btn">
إرسال الطلب عبر واتساب
</button>
</div>

<a href="https://wa.me/966565717405" class="whatsapp-float">💬</a>

<footer>
📞 0565717405<br>
محل ستائر الصفاء
</footer>

<script>
let slides=document.querySelectorAll(".slide");
let index=0;

function showSlide(i){
slides.forEach(s=>s.classList.remove("active"));
slides[i].classList.add("active");
}

function nextSlide(){
index++; if(index>=slides.length) index=0;
showSlide(index);
}

function prevSlide(){
index--; if(index<0) index=slides.length-1;
showSlide(index);
}

setInterval(()=>{nextSlide();},6000);

function sendOrder(){
var name=document.getElementById("name").value;
var phone=document.getElementById("phone").value;
var width=document.getElementById("width").value;
var height=document.getElementById("height").value;
var type=document.getElementById("type").value;
var details=document.getElementById("details").value;

var msg="طلب جديد:%0A"
+"الاسم: "+name+"%0A"
+"الرقم: "+phone+"%0A"
+"العرض: "+width+"%0A"
+"الطول: "+height+"%0A"
+"النوع: "+type+"%0A"
+"تفاصيل: "+details;

window.open("https://wa.me/966565717405?text="+msg,"_blank");
}
</script>

</body>
</html>
