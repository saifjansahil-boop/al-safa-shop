<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محل ستائر الصفاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background: #f4f7f6;
            text-align: center;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, #001f3f, #003366);
            padding: 40px 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .main-logo {
            width: 95%;
            max-width: 550px;
            height: auto;
            border-radius: 15px;
            display: block;
            margin: 0 auto;
            border: 2px solid #d4af37;
        }

        .location {
            background: #d4af37;
            color: white;
            padding: 15px;
            margin: 25px auto;
            border-radius: 30px;
            text-decoration: none;
            display: block;
            width: 85%;
            max-width: 400px;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.4);
            transition: 0.3s ease;
        }

        .location:hover {
            background: #b8962d;
            transform: scale(1.05);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .item {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .item:hover {
            transform: translateY(-10px);
        }

        .item img { 
            width: 100%; 
            height: 300px; 
            object-fit: cover; 
        }

        .btn {
            background: #25d366;
            color: white;
            padding: 15px;
            text-decoration: none;
            display: block;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1ebe57;
        }

        .form-box {
            background: white;
            margin: 40px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 550px;
            width: 90%;
        }

        .form-box h2 {
            color: #003366;
            margin-bottom: 25px;
        }

        .form-box input, .form-box textarea, .form-box select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
        }

        .submit-btn {
            background: #003366;
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: #d4af37;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #25d366;
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        footer {
            background: #111;
            color: #d4af37;
            padding: 40px 20px;
            margin-top: 50px;
            font-size: 18px;
        }
    </style>
</head>

<body>

<header>
    <img src="Screenshot_20260428_115312.jpg" alt="محل ستائر الصفاء" class="main-logo">
</header>

<a class="location" href="https://maps.google.com/?q=Al-Hofuf">
    📍 موقعنا: الهفوف - بجانب رايز جاردن
</a>

<div class="gallery">
    <div class="item"><img src="IMG-20260426-WA0012.jpg"><a href="https://wa.me/966565717405" class="btn">طلب عبر واتساب</a></div>
    <div class="item"><img src="IMG-20260426-WA0011.jpg"><a href="https://wa.me/966565717405" class="btn">طلب عبر واتساب</a></div>
    <div class="item"><img src="IMG-20260426-WA0020.jpg"><a href="https://wa.me/966565717405" class="btn">طلب عبر واتساب</a></div>
    </div>

<div class="form-box">
    <h2>📋 طلب ستائر أونلاين</h2>
    <input type="text" id="name" placeholder="اسمك الكريم">
    <input type="tel" id="phone" placeholder="رقم الجوال">
    <select id="type">
        <option value="" disabled selected>اختر نوع الستارة</option>
        <option value="مودرن">مودرن</option>
        <option value="كلاسيك">كلاسيك</option>
        <option value="ديكور خاص">ديكور خاص</option>
    </select>
    <textarea id="details" rows="4" placeholder="تفاصيل أخرى أو مقاسات..."></textarea>
    <button class="submit-btn" onclick="sendOrder()">إرسال الطلب عبر واتساب</button>
</div>

<a href="https://wa.me/966565717405" class="whatsapp-float">💬</a>

<footer>
    <strong>محــــــــــــــــــــــــــــل ديكورات الـــــــــــــــــصفــــــــاء</strong><br><br>
    📞 التواصل: 0565717405<br>
    المملكة العربية السعودية - الهفوف
</footer>

<script>
function sendOrder() {
    var name = document.getElementById("name").value;
    var phone = document.getElementById("phone").value;
    var type = document.getElementById("type").value;
    var details = document.getElementById("details").value;

    if(name == "" || phone == "") {
        alert("يرجى إدخال الاسم ورقم الجوال");
        return;
    }

    var msg = "*طلب جديد من الموقع*%0A"
    + "*الاسم:* " + name + "%0A"
    + "*الرقم:* " + phone + "%0A"
    + "*النوع:* " + type + "%0A"
    + "*التفاصيل:* " + details;

    window.open("https://wa.me/966565717405?text=" + msg, "_blank");
}
</script>

</body>
</html>
