    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #f0f2f5;
            text-align: center;
        }

        header {
            background: linear-gradient(135deg, #001f3f, #003366);
            padding: 30px 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .main-logo {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-radius: 10px;
            display: block;
            margin: 0 auto;
        }

        .location {
            background: #d4af37;
            color: white;
            padding: 15px;
            margin: 20px auto;
            border-radius: 25px;
            text-decoration: none;
            display: block;
            width: 90%;
            max-width: 400px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .location:hover {
            background: #b8962d;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 15px;
        }

        .item {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .item img { width: 100%; height: auto; }

        .btn {
            background: #25d366;
            color: white;
            padding: 12px;
            text-decoration: none;
            display: block;
            font-weight: bold;
        }

        .form-box {
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .form-box input, .form-box textarea, .form-box select {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .submit-btn {
            background: #003366;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25d366;
            color: white;
            padding: 15px;
            border-radius: 50%;
            font-size: 22px;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        footer {
            background: #111;
            color: #d4af37;
            padding: 20px;
            margin-top: 20px;
        }
    </style>
</head>

<div class="form-box">
    <h2>📋 طلب ستائر أونلاين</h2>
    <input type="text" id="name" placeholder="اسمك">
    <input type="text" id="phone" placeholder="رقم الجوال">
    <select id="type">
        <option>نوع الستارة</option>
        <option>مودرن</option>
        <option>كلاسيك</option>
    </select>
    <textarea id="details" placeholder="تفاصيل أخرى"></textarea>
    <button class="submit-btn" onclick="sendOrder()">إرسال واتساب</button>

<script>
function sendOrder() {
    var name = document.getElementById("name").value;
    var phone = document.getElementById("phone").value;
    var type = document.getElementById("type").value;
    var details = document.getElementById("details").value;

    if(name == "" || phone == "") {
        alert("يرجى إدخال الاسم ورقم الجوال");
        return;
    }

    var msg = "طلب جديد من الموقع:%0A"
    + "الاسم: " + name + "%0A"
    + "الرقم: " + phone + "%0A"
    + "النوع: " + type + "%0A"
    + "تفاصيل: " + details;

    window.open("https://wa.me/966565717405?text=" + msg, "_blank");
}
</script>
